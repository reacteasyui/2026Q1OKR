      // 等待DOM加载完成和Echarts库加载
      document.addEventListener('DOMContentLoaded', function() {
        // 检查Echarts是否加载成功
        if (typeof echarts === 'undefined') {
          console.error('Echarts库未加载成功');
          // 创建备用CDN链接
          var script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js';
          script.onload = function() {
            console.log('备用Echarts CDN加载成功');
            initApp();
          };
          script.onerror = function() {
            console.error('所有Echarts CDN都加载失败，图表将无法显示');
            // 即使没有Echarts，也要初始化应用的其他部分
            initApp(true);
          };
          document.body.appendChild(script);
        } else {
          console.log('Echarts库加载成功');
          initApp();
        }
      });
      
      // 主题管理
      function getTheme() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
          return savedTheme;
        }
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      
      function setTheme(theme) {
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(theme);
        localStorage.setItem('theme', theme);
      }

        { name: '消息', value: 6 },

          tooltip: {
            trigger: 'axis',
            axisPointer: {
              type: 'shadow'
            }
          },
          grid: {
            left: '3%',
            right: '4%',
            bottom: '3%',
            containLabel: true
          },
          xAxis: [
            {
              type: 'category',
              data: priorityData.map(item => item.name + '优先级'),
              axisLabel: {
                color: textColor
              },
              axisLine: {
                lineStyle: {
                  color: gridColor
                }
              }
            }
          ],
          yAxis: [
            {
              type: 'value',
              axisLabel: {
                color: textColor
              },
              axisLine: {
                lineStyle: {
                  color: gridColor
                }
              },
              splitLine: {
                lineStyle: {
                  color: gridColor
                }
              }
            }
          ],
          series: [
            {
              name: '需求数量',
              type: 'bar',
              barWidth: '60%',
              data: priorityData.map((item, index) => ({
                value: item.value,
                itemStyle: {
                  color: COLORS[index % COLORS.length]
                }
              }))
            }
          ]
        });
        
        // 合同处理图表
        const contractChart = echarts.init(document.getElementById('contract-chart'));
        contractChart.setOption({
          backgroundColor: 'transparent',
          tooltip: {
            trigger: 'axis',
            axisPointer: {
              type: 'shadow'
            }
          },
          legend: {
            data: ['总耗时(分钟)'],
            textStyle: {
              color: textColor
            },
            top: 'bottom'
          },
          grid: {
            left: '3%',
            right: '4%',
            bottom: '15%',
            containLabel: true
          },
          xAxis: [
            {
              type: 'category',
              data: contractData.map(item => item.name),
              axisLabel: {
                color: textColor
              },
              axisLine: {
                lineStyle: {
                  color: gridColor
                }
              }
            }
          ],
          yAxis: [
            {
              type: 'value',
              axisLabel: {
                color: textColor
              },
              axisLine: {
                lineStyle: {
                  color: gridColor
                }
              },
              splitLine: {
                lineStyle: {
                  color: gridColor
                }
              }
            }
          ],
          series: [
            {
              name: '总耗时(分钟)',
              type: 'bar',
              data: contractData.map(item => item.totalTime),
              itemStyle: {
                color: '#8884d8'
              }
            }
          ]
        });
        
        // 响应式调整
        window.addEventListener('resize', function() {
          moduleChart.resize();
          businessLineChart.resize();
          priorityChart.resize();
          contractChart.resize();
        });
        
        console.log('所有图表渲染完成');
      }
    </script>
  </body>
</html>
